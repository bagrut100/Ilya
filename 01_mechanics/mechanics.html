<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכניקה ניוטונית - תרגילים</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <nav class="bg-slate-900 text-white py-3 px-4 shadow-sm">
        <div class="container mx-auto max-w-5xl flex justify-between items-center">
            <span class="font-bold text-cyan-400">מכניקה ניוטונית | מאגר חומרי לימוד</span>
            <a href="../index.html" class="text-sm bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded transition">חזרה לדף הבית 🏠</a>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-4xl">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-6">
            <span class="text-sm font-bold text-gray-500 block mb-2">סינון לפי נושאים (נוצר אוטומטית):</span>
            <div class="flex flex-wrap gap-2" id="tags-container">
                <button onclick="filterTags('all')" class="bg-slate-900 text-white text-xs font-semibold px-3 py-1.5 rounded-full transition cursor-pointer">הכל (#all)</button>
            </div>
        </div>

        <div class="space-y-4" id="materials-list">
            
            <div class="item-card bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col sm:flex-row justify-between sm:items-center gap-4 transition" 
                 data-tags="קינמטיקה,זריקה_אנכית,בגרות">
                <div>
                    <h4 class="font-bold text-gray-900 text-lg">תנועה שוות תאוצה - זריקה אנכית</h4>
                    <p class="text-gray-500 text-xs mt-1 mb-3">ניתוח גרפים של מהירות כפונקציה של הזמן ומציאת גובה מקסימלי.</p>
                    <div class="card-tags-visible flex flex-wrap gap-1.5"></div>
                </div>
                <a href="#" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg text-center transition">פתח קובץ</a>
            </div>

            <div class="item-card bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col sm:flex-row justify-between sm:items-center gap-4 transition" 
                 data-tags="דינמיקה,חוקי_ניוטון,חיכוך">
                <div>
                    <h4 class="font-bold text-gray-900 text-lg">גוף על מישור משופע עם חיכוך</h4>
                    <p class="text-gray-500 text-xs mt-1 mb-3">חישוב מקדם החיכוך הסטטי והקינטי ומציאת תאוצת המערכת.</p>
                    <div class="card-tags-visible flex flex-wrap gap-1.5"></div>
                </div>
                <a href="#" class="bg-gray-400 text-white text-sm font-medium px-4 py-2 rounded-lg text-center cursor-not-allowed">בקרוב</a>
            </div>

        </div>
    </main>

    <script>
        const cards = document.querySelectorAll('.item-card');
        const tagsContainer = document.getElementById('tags-container');
        const allTags = new Set();

        cards.forEach(card => {
            const rawTags = card.getAttribute('data-tags');
            if (rawTags) {
                const tagsArray = rawTags.split(',');
                const visibleContainer = card.querySelector('.card-tags-visible');
                tagsArray.forEach(tag => {
                    allTags.add(tag);
                    const tagSpan = document.createElement('span');
                    tagSpan.className = "text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded hover:bg-cyan-100 hover:text-cyan-700 cursor-pointer";
                    tagSpan.innerText = `#${tag}`;
                    tagSpan.onclick = () => filterTags(tag);
                    visibleContainer.appendChild(tagSpan);
                });
            }
        });

        allTags.forEach(tag => {
            const btn = document.createElement('button');
            btn.className = "bg-cyan-50 hover:bg-cyan-100 text-cyan-700 text-xs font-semibold px-3 py-1.5 rounded-full transition cursor-pointer";
            btn.innerText = `#${tag}`;
            btn.onclick = () => filterTags(tag);
            tagsContainer.appendChild(btn);
        });

        function filterTags(selectedTag) {
            cards.forEach(card => {
                const cardTags = card.getAttribute('data-tags').split(',');
                if (selectedTag === 'all' || cardTags.includes(selectedTag)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
